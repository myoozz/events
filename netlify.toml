[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://rjscsnakkexunvsfhdut.supabase.co; connect-src 'self' https://rjscsnakkexunvsfhdut.supabase.co wss://rjscsnakkexunvsfhdut.supabase.co; frame-ancestors 'none';"

[[headers]]
  for = "/app/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
